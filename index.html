<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Wine Cellar</title>
<style>
  :root {
    --bg: #faf9f7; --bg2: #f2f0ec; --bg3: #e8e5e0;
    --text: #1a1a18; --text2: #5a5955; --text3: #9a9890;
    --border: rgba(0,0,0,0.1); --border2: rgba(0,0,0,0.18);
    --accent: #7c3d2e; --accent-bg: #fdf0ed; --accent-text: #7c3d2e;
    --info-bg: #eef4fb; --info-text: #1a5fa8;
    --danger-bg: #fdf0ed; --danger-text: #a33a1e;
    --success-bg: #edf7f2; --success-text: #1a7a48;
    --radius: 10px; --radius-sm: 6px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1b19; --bg2: #252420; --bg3: #2e2c28;
      --text: #f0ede8; --text2: #a8a59f; --text3: #6a6760;
      --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.18);
      --accent: #e8836a; --accent-bg: #2e1e18; --accent-text: #e8836a;
      --info-bg: #152035; --info-text: #7ab8f5;
      --danger-bg: #2e1510; --danger-text: #f59070;
      --success-bg: #0f2a1c; --success-text: #6fcf97;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 15px; }
  input, select, textarea { font-family: inherit; font-size: 14px; color: var(--text); background: var(--bg); border: 1px solid var(--border2); border-radius: var(--radius-sm); padding: 8px 12px; width: 100%; outline: none; transition: border-color 0.15s; }
  input:focus, select:focus, textarea:focus { border-color: var(--accent); }
  button { font-family: inherit; font-size: 14px; cursor: pointer; border: 1px solid var(--border2); border-radius: var(--radius-sm); padding: 8px 16px; background: var(--bg); color: var(--text); transition: background 0.15s; }
  button:hover { background: var(--bg3); }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  button.primary { background: var(--accent); color: #fff; border-color: transparent; }
  button.primary:hover { opacity: 0.9; }
  button.danger { background: var(--danger-bg); color: var(--danger-text); border-color: transparent; font-size: 12px; padding: 4px 10px; }
  .badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 99px; }
  .badge-region { background: var(--info-bg); color: var(--info-text); }
  .badge-grape { background: var(--bg3); color: var(--text2); border: 1px solid var(--border); }
  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid currentColor; border-top-color: transparent; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #app { max-width: 1100px; margin: 0 auto; padding: 1rem; }
  #setup-screen { max-width: 480px; margin: 3rem auto; background: var(--bg2); border-radius: var(--radius); padding: 2rem; border: 1px solid var(--border); }
  #setup-screen h2 { font-size: 18px; font-weight: 500; margin-bottom: 0.5rem; }
  #setup-screen p { color: var(--text2); font-size: 13px; line-height: 1.6; margin-bottom: 1.25rem; }
  #setup-screen label { font-size: 12px; color: var(--text2); display: block; margin-bottom: 4px; margin-top: 12px; }
  .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1.25rem; }
  .tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 1.25rem; overflow-x: auto; }
  .tab { padding: 9px 14px; font-size: 13px; background: none; border: none; border-bottom: 2px solid transparent; border-radius: 0; color: var(--text2); white-space: nowrap; }
  .tab.active { color: var(--text); border-bottom-color: var(--accent); font-weight: 500; }
  .filters { display: flex; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap; }
  .filters input { flex: 1; min-width: 180px; }
  .filters select { width: auto; flex-shrink: 0; }
  .view-toggle { display: flex; border: 1px solid var(--border2); border-radius: var(--radius-sm); overflow: hidden; }
  .view-toggle button { border: none; border-radius: 0; padding: 6px 12px; font-size: 13px; }
  .view-toggle button.active { background: var(--bg3); font-weight: 500; }
  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin-bottom: 1.25rem; }
  .stat { background: var(--bg2); border-radius: var(--radius-sm); padding: 12px 14px; }
  .stat-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
  .stat-value { font-size: 22px; font-weight: 600; color: var(--text); }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 14px; }
  .card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; display: flex; flex-direction: column; }
  .card-img { height: 170px; background: var(--bg3); display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
  .card-img img { height: 100%; width: 100%; object-fit: contain; }
  .card-img .no-img { color: var(--text3); text-align: center; font-size: 12px; }
  .vintage-badge { position: absolute; top: 8px; right: 8px; background: var(--bg); color: var(--text2); border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 11px; font-weight: 500; padding: 2px 7px; }
  .card-body { padding: 11px 13px; flex: 1; display: flex; flex-direction: column; gap: 5px; }
  .card-winery { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.04em; }
  .card-name { font-weight: 500; font-size: 14px; line-height: 1.3; color: var(--text); }
  .card-badges { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 2px; }
  .card-footer { display: flex; justify-content: flex-end; align-items: center; padding: 8px 13px; border-top: 1px solid var(--border); }
  .bottle-ctrl { display: flex; align-items: center; gap: 8px; }
  .bottle-ctrl button { width: 24px; height: 24px; padding: 0; display: flex; align-items: center; justify-content: center; font-size: 15px; border-radius: var(--radius-sm); }
  .bottle-ctrl span { font-weight: 500; font-size: 15px; min-width: 18px; text-align: center; }
  .card-remove { padding: 6px 13px 10px; }
  .list-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .list-table th { padding: 8px 12px; text-align: left; font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em; background: var(--bg2); border-bottom: 1px solid var(--border); font-weight: 500; }
  .list-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  .list-table tr:last-child td { border-bottom: none; }
  .list-table .thumb { width: 36px; height: 50px; object-fit: contain; border-radius: 4px; background: var(--bg3); display: block; }
  .empty { text-align: center; padding: 3rem 1rem; color: var(--text3); }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .form-group { margin-bottom: 12px; }
  .form-group label { font-size: 12px; color: var(--text2); display: block; margin-bottom: 4px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .notice { background: var(--info-bg); color: var(--info-text); border-radius: var(--radius-sm); padding: 10px 14px; font-size: 13px; margin-bottom: 1rem; display: flex; align-items: center; gap: 8px; }
  .notice.success { background: var(--success-bg); color: var(--success-text); }
  .notice.danger { background: var(--danger-bg); color: var(--danger-text); }
  .photo-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .photo-btn { padding: 1.5rem 1rem; font-size: 14px; border-radius: var(--radius); text-align: center; background: var(--bg2); border: 1px dashed var(--border2); display: flex; flex-direction: column; gap: 8px; align-items: center; }
  .photo-btn span.icon { font-size: 28px; }
  textarea { resize: vertical; }
  #token-toggle { font-size: 11px; color: var(--text3); background: none; border: none; padding: 0; margin-top: 4px; cursor: pointer; }
  @media (max-width: 600px) { .form-row { grid-template-columns: 1fr; } .stats { grid-template-columns: 1fr 1fr; } .list-table { display: none; } }
</style>
</head>
<body>
<div id="app">
  <div id="setup-screen" style="display:none;">
    <h2>🍷 Wine Cellar Setup</h2>
    <p>This app uses GitHub to store your wine data. You only need to set this up once per browser.</p>
    <label>GitHub username</label>
    <input id="setup-user" type="text" placeholder="e.g. RudiKotze" autocomplete="off" />
    <label>Repository name</label>
    <input id="setup-repo" type="text" placeholder="e.g. wine-cellar" value="wine-cellar" />
    <label>Personal Access Token <a href="https://github.com/settings/tokens/new?scopes=repo&description=Wine+Cellar" target="_blank" style="color:var(--accent);font-size:11px;margin-left:4px;">Create one ↗</a></label>
    <input id="setup-token" type="password" placeholder="ghp_xxxxxxxxxxxx" autocomplete="off" />
    <button id="token-toggle" onclick="toggleToken()">show token</button>
    <br><br>
    <button class="primary" onclick="saveSetup()" style="width:100%;padding:10px;">Save & connect</button>
    <div id="setup-error" style="display:none;margin-top:10px;padding:8px 12px;background:var(--danger-bg);color:var(--danger-text);border-radius:var(--radius-sm);font-size:13px;"></div>
    <p style="margin-top:1rem;font-size:12px;color:var(--text3);">Your token is stored only in this browser, never shared.</p>
  </div>

  <div id="main-screen" style="display:none;">
    <div class="header">
      <div>
        <h1 style="font-size:22px;font-weight:500;
